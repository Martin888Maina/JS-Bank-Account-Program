<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Bank Account Management System using JavaScript OOP">
    <title>Bank Account Manager - JavaScript OOP</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Main application container -->
    <div class="container">
        <!-- Header section with branding -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h1>SecureBank</h1>
            </div>
            <p class="subtitle">JavaScript OOP Banking System</p>
        </header>

        <!-- Account overview card -->
        <div class="account-card">
            <div class="account-header">
                <div>
                    <p class="account-label">Account Holder</p>
                    <h2 class="account-name" id="accountHolder">-</h2>
                </div>
                <div class="account-status" id="accountStatus">
                    <span class="status-badge">Active</span>
                </div>
            </div>

            <div class="balance-section">
                <p class="balance-label">Current Balance</p>
                <h3 class="balance-amount" id="balanceAmount">KSh 0.00</h3>
                <div class="balance-indicator" id="balanceIndicator"></div>
            </div>
        </div>

        <!-- Transaction controls -->
        <div class="transaction-panel">
            <h3 class="panel-title">Transaction Center</h3>

            <div class="input-group">
                <label for="amount">Enter Amount (KSh)</label>
                <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" class="amount-input">
            </div>

            <div class="button-group">
                <button class="btn btn-deposit" id="depositBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                    Deposit
                </button>
                <button class="btn btn-withdraw" id="withdrawBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                    Withdraw
                </button>
            </div>

            <button class="btn btn-check" id="checkBalanceBtn">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Check Balance
            </button>
        </div>

        <!-- Transaction history -->
        <div class="history-panel">
            <h3 class="panel-title">Transaction History</h3>
            <div class="history-list" id="historyList">
                <p class="empty-state">No transactions yet</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
